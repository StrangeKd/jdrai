name: jdrai

services:
  postgres:
    restart: always
    image: postgres:16-alpine
    container_name: jdrai-db
    environment:
      POSTGRES_USER: jdrai
      POSTGRES_PASSWORD: jdrai
      POSTGRES_DB: jdrai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdrai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
