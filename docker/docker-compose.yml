name: jdrai

services:
  postgres:
    image: postgres:16-alpine
    container_name: jdrai_postgres
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jdrai}
      POSTGRES_USER: ${POSTGRES_USER:-jdrai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jdrai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jdrai_user} -d ${POSTGRES_DB:-jdrai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  jdrai_network:
    driver: bridge
