name: jdrai

# PostgreSQL is managed by Dokploy — not declared here.
# Set DATABASE_URL in Dokploy's environment variables to point to the Dokploy DB.

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - default
      - dokploy-network
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      API_PORT: ${API_PORT:-3000}
      API_URL: ${API_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      LLM_PRIMARY_PROVIDER: ${LLM_PRIMARY_PROVIDER:-openai}
      LLM_FALLBACK_ORDER: ${LLM_FALLBACK_ORDER:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_OPENAI_MODELS: ${LLM_OPENAI_MODELS:-}
      LLM_ANTHROPIC_MODELS: ${LLM_ANTHROPIC_MODELS:-}
      LLM_OPENROUTER_MODELS: ${LLM_OPENROUTER_MODELS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

networks:
  default:
  dokploy-network:
    external: true
    name: dokploy-network
