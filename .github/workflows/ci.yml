name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  deploy-production:
    name: Deploy → Production
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Call Dokploy webhook
        run: |
          curl -fsSL -X POST \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/main"}' \
            "${{ secrets.DOKPLOY_WEBHOOK_URL }}"

  deploy-staging:
    name: Deploy → Staging
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Call Dokploy webhook
        run: |
          curl -fsSL -X POST \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            --retry-connrefused \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/staging"}' \
            "${{ secrets.DOKPLOY_WEBHOOK_URL_STAGING }}"
